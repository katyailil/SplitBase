name: upgrade

on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
      proxy:
        description: proxy override (optional)
        required: false

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install tools and deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2
          forge install foundry-rs/forge-std@v1.9.1

      - name: Setup network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=8453" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=84532" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi

      - name: Resolve proxy
        id: proxy
        run: |
          if [ -n "${{ github.event.inputs.proxy }}" ]; then ADDR="${{ github.event.inputs.proxy }}"; else ADDR=$(jq -r '.proxy' "${{ steps.net.outputs.DEP }}"); fi
          if [ -z "$ADDR" ] || [ "$ADDR" = "null" ]; then echo "Proxy address is empty"; exit 1; fi
          if ! echo "$ADDR" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then echo "Invalid proxy address: $ADDR"; exit 1; fi
          echo "PROXY=$ADDR" >> $GITHUB_ENV
          echo "ADDR=$ADDR" >> $GITHUB_OUTPUT
          echo "Proxy: $ADDR"

      - name: Check owner matches PRIVATE_KEY
        id: who
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.ADDR }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          OWNER=$(cast call "$PROXY" "owner()(address)" --rpc-url "$RPC_URL" || echo "")
          echo "Sender: $SENDER"
          echo "Owner:  $OWNER"
          if [ -z "$OWNER" ] || [ "$OWNER" = "0x0000000000000000000000000000000000000000" ]; then echo "owner() not readable"; exit 1; fi
          if [ "${OWNER,,}" != "${SENDER,,}" ]; then echo "PRIVATE_KEY is not the proxy owner"; exit 1; fi
          echo "SENDER=$SENDER" >> $GITHUB_OUTPUT

      - name: Read current implementation
        id: cur
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.ADDR }}
        run: |
          SLOT=0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc
          RAW=$(cast storage "$PROXY" "$SLOT" --rpc-url "$RPC_URL" | tail -n1)
          IMPL=0x$(echo "$RAW" | tail -c 41)
          echo "CURRENT_IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "Current implementation: $IMPL"
          cast call "$IMPL" "proxiableUUID()(bytes32)" --rpc-url "$RPC_URL"

      - name: Build
        run: forge build -vv

      - name: Deploy DummyUUPS
        id: dummy
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          forge create src/DummyUUPS.sol:DummyUUPS \
            --rpc-url "$RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast -vvvv > dd.txt
          DUMMY=$(grep -E "Deployed to:" dd.txt | awk '{print $3}')
          echo "DUMMY=$DUMMY" >> $GITHUB_OUTPUT
          echo "Dummy: $DUMMY"

      - name: Simulate upgrade to Dummy
        id: sim1
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ env.PROXY }}
          FROM: ${{ steps.who.outputs.SENDER }}
          DUMMY: ${{ steps.dummy.outputs.DUMMY }}
        run: |
          set +e
          OUT=$(cast call "$PROXY" "upgradeTo(address)" "$DUMMY" --from "$FROM" --rpc-url "$RPC_URL" 2>&1)
          CODE=$?
          echo "$OUT"
          set -e
          if [ $CODE -ne 0 ]; then echo "Simulation to Dummy reverted above"; exit 1; fi

      - name: Upgrade to Dummy
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ env.PROXY }}
          DUMMY: ${{ steps.dummy.outputs.DUMMY }}
        run: |
          cast send "$PROXY" "upgradeTo(address)" "$DUMMY" \
            --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY" --legacy -vvvv

      - name: Deploy real SplitBaseUpgradeable
        id: newimpl
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          forge create src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --rpc-url "$RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast -vvvv > cr.txt
          IMPL=$(grep -E "Deployed to:" cr.txt | awk '{print $3}')
          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "New impl: $IMPL"

      - name: Upgrade to real impl
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ env.PROXY }}
          IMPL: ${{ steps.newimpl.outputs.IMPL }}
        run: |
          cast send "$PROXY" "upgradeTo(address)" "$IMPL" \
            --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY" --legacy -vvvv

      - name: Verify implementation
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge verify-contract \
            ${{ steps.newimpl.outputs.IMPL }} \
            src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --chain ${{ steps.net.outputs.CID }} \
            --watch

      - name: Update manifest
        run: |
          BN=$(cast block-number --rpc-url "${{ steps.net.outputs.RPC }}")
          jq --arg i "${{ steps.newimpl.outputs.IMPL }}" --argjson bn $BN \
             '.implementation=$i | .blockNumber=$bn | .verified=true | .updatedAt=now|toISOString' \
             "${{ steps.net.outputs.DEP }}" > tmp.json
          mv tmp.json "${{ steps.net.outputs.DEP }}"
          cat "${{ steps.net.outputs.DEP }}"

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/*.json
          git commit -m "chore(deployments): update implementation and metadata for ${{ github.event.inputs.network }}"
          git push
