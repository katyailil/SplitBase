name: upgrade-disabled

on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
      proxy:
        description: proxy override (optional)
        required: false

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Resolve network + proxy
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then DEP=deployments/8453.json; RPC="${{ secrets.BASE_MAINNET_RPC_URL }}"; else DEP=deployments/84532.json; RPC="${{ secrets.BASE_SEPOLIA_RPC_URL }}"; fi
          if [ -n "${{ github.event.inputs.proxy }}" ]; then P="${{ github.event.inputs.proxy }}"; else P=$(jq -r '.proxy' "$DEP"); fi
          echo "rpc=$RPC" >> $GITHUB_OUTPUT
          echo "proxy=$P"   >> $GITHUB_OUTPUT
          echo "Using proxy: $P"
      - name: Print current implementation
        env:
          RPC_URL: ${{ steps.net.outputs.rpc }}
          PROXY:   ${{ steps.net.outputs.proxy }}
        run: |
          SLOT=0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc
          RAW=$(cast storage "$PROXY" "$SLOT" --rpc-url "$RPC_URL" | tail -n1)
          IMPL=0x$(echo "$RAW" | tail -c 41)
          echo "Implementation: $IMPL"
          cast code "$IMPL" --rpc-url "$RPC_URL" >/dev/null
      - name: Stop (upgrade temporarily disabled)
        run: |
          echo "Upgrade is temporarily disabled due to revert on current implementation. Proceeding with tests/README."
