name: upgrade

on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
      proxy:
        description: proxy override (optional)
        required: false

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install tools and deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2
          forge install foundry-rs/forge-std@v1.9.1

      - name: Setup network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=8453" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=84532" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi

      - name: Resolve proxy
        id: proxy
        run: |
          if [ -n "${{ github.event.inputs.proxy }}" ]; then
            ADDR="${{ github.event.inputs.proxy }}"
          else
            ADDR=$(jq -r '.proxy' "${{ steps.net.outputs.DEP }}")
          fi
          if [ -z "$ADDR" ] || [ "$ADDR" = "null" ]; then
            echo "Proxy address is empty"; exit 1;
          fi
          if ! echo "$ADDR" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then
            echo "Invalid proxy address: $ADDR"; exit 1;
          fi
          echo "PROXY=$ADDR" >> $GITHUB_ENV
          echo "ADDR=$ADDR" >> $GITHUB_OUTPUT
          echo "Candidate proxy: $ADDR"

      - name: Detect implementation and UUPS capability
        id: detect
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.ADDR }}
        run: |
          SLOT=0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc
          RAW=$(cast storage "$PROXY" "$SLOT" --rpc-url "$RPC_URL" | tail -n1)
          IMPL=0x$(echo "$RAW" | tail -c 41)
          echo "Current implementation: $IMPL"
          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT

          if ! echo "$IMPL" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then
            echo "Failed to read implementation slot"; exit 1;
          fi

          if cast call "$IMPL" "proxiableUUID()(bytes32)" --rpc-url "$RPC_URL" >/dev/null 2>&1; then
            echo "PATTERN=UUPS" >> $GITHUB_OUTPUT
            echo "Detected UUPS-compatible implementation"
          else
            echo "PATTERN=NON_UUPS" >> $GITHUB_OUTPUT
            echo "Implementation does not expose proxiableUUID() — not UUPS"
          fi

      - name: Check owner matches PRIVATE_KEY
        if: steps.detect.outputs.PATTERN == 'UUPS'
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.ADDR }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          OWNER=$(cast call "$PROXY" "owner()(address)" --rpc-url "$RPC_URL" || echo "")
          echo "Sender: $SENDER"
          echo "Owner:  $OWNER"
          if [ -z "$OWNER" ] || [ "$OWNER" = "0x0000000000000000000000000000000000000000" ]; then
            echo "owner() not readable via proxy; ensure your implementation inherits Ownable and exposes owner()"; exit 1;
          fi
          if [ "${OWNER,,}" != "${SENDER,,}" ]; then
            echo "Private key is not the proxy owner. Aborting."; exit 1;
          fi

      - name: Upgrade (UUPS path)
        if: steps.detect.outputs.PATTERN == 'UUPS'
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ env.PROXY }}
        run: |
          forge script script/UpgradeUUPS.s.sol:UpgradeUUPS \
            --rpc-url "$RPC_URL" \
            --broadcast \
            --private-key "$PRIVATE_KEY" \
            --sig "run()" \
            -vvvv > out.txt

      - name: Fail for non-UUPS
        if: steps.detect.outputs.PATTERN == 'NON_UUPS'
        run: |
          echo "This proxy's current implementation is NOT UUPS. upgradeTo() will always revert."
          echo "Next steps:"
          echo "1) Confirm proxy pattern (Transparent vs ERC1967 vs custom)."
          echo "2) If Transparent, upgrade must be executed via ProxyAdmin contract."
          echo "3) Provide PROXY_ADMIN address so we can add a transparent-upgrade workflow."
          exit 1

      - name: Parse new implementation
        id: parse
        if: steps.detect.outputs.PATTERN == 'UUPS'
        run: |
          IMPL=$(grep -E "^Implementation " out.txt | awk '{print $2}')
          if [ -z "$IMPL" ]; then
            IMPL=$(grep -E "^New implementation deployed:" out.txt | awk '{print $4}')
          fi
          if ! echo "$IMPL" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then
            echo "Implementation not found in logs"; cat out.txt; exit 1;
          fi
          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "New implementation: $IMPL"

      - name: Verify implementation
        if: steps.detect.outputs.PATTERN == 'UUPS'
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge verify-contract \
            ${{ steps.parse.outputs.IMPL }} \
            src/implementations/SplitBaseV1.sol:SplitBaseV1 \
            --chain ${{ steps.net.outputs.CID }} \
            --watch

      - name: Update manifest
        if: steps.detect.outputs.PATTERN == 'UUPS'
        run: |
          BN=$(cast block-number --rpc-url "${{ steps.net.outputs.RPC }}")
          jq --arg i "${{ steps.parse.outputs.IMPL }}" --argjson bn $BN \
             '.implementation=$i | .blockNumber=$bn | .verified=true | .updatedAt=now|toISOString' \
             "${{ steps.net.outputs.DEP }}" > tmp.json
          mv tmp.json "${{ steps.net.outputs.DEP }}"
          cat "${{ steps.net.outputs.DEP }}"

      - name: Commit manifest
        if: steps.detect.outputs.PATTERN == 'UUPS'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/*.json
          git commit -m "chore(deployments): update implementation and metadata for ${{ github.event.inputs.network }}"
          git push
