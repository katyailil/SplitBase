name: upgrade

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
        required: true

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2
          forge install foundry-rs/forge-std

      - name: Select network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "sepolia" ]; then
            echo "CHAIN=84532" >> $GITHUB_OUTPUT
            echo "DEPLOY=deployments/84532.json" >> $GITHUB_OUTPUT
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
          else
            echo "CHAIN=8453" >> $GITHUB_OUTPUT
            echo "DEPLOY=deployments/8453.json" >> $GITHUB_OUTPUT
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve proxy
        id: addr
        run: |
          PROXY=$(jq -r '.proxy' ${{ steps.net.outputs.DEPLOY }})
          echo "PROXY=$PROXY" >> $GITHUB_OUTPUT
          echo "Using proxy: $PROXY"

      - name: Build
        run: forge build -vv

      - name: Deploy new implementation
        id: impl
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          set -e
          forge create src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --private-key "$PRIVATE_KEY" \
            --rpc-url "$RPC_URL" \
            --json > deploy.json

          IMPL=$(jq -r '.deployedTo // .receipts[0].contractAddress // .transactions[0].contractAddress' deploy.json)
          
          if [ -z "$IMPL" ] || [ "$IMPL" = "null" ]; then
            echo "Failed to get implementation address"
            cat deploy.json
            exit 1
          fi
          
          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "Implementation deployed: $IMPL"

      - name: Verify implementation
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
          CHAIN: ${{ steps.net.outputs.CHAIN }}
        run: |
          forge verify-contract \
            --chain-id $CHAIN \
            --watch \
            $IMPL \
            src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable || echo "Verification queued"

      - name: Upgrade proxy
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ steps.addr.outputs.PROXY }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
        run: |
          set -e
          
          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          echo "Sender: $SENDER"
          
          BASE_GAS=$(cast gas-price --rpc-url "$RPC_URL")
          MAX_FEE=$(echo "$BASE_GAS * 15 / 10" | bc)
          PRIORITY=$(echo "$BASE_GAS / 5" | bc)
          
          if [ $(echo "$PRIORITY < 1000000000" | bc) -eq 1 ]; then
            PRIORITY=1000000000
          fi
          
          echo "Gas: base=$BASE_GAS max=$MAX_FEE priority=$PRIORITY"
          
          cast send "$PROXY" \
            "upgradeTo(address)" "$IMPL" \
            --private-key "$PRIVATE_KEY" \
            --rpc-url "$RPC_URL" \
            --priority-gas-price "$PRIORITY" \
            --gas-limit 500000 \
            --confirmations 2
          
          echo "Upgrade successful!"

      - name: Update deployment manifest
        env:
          DEPLOY_FILE: ${{ steps.net.outputs.DEPLOY }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg impl "$IMPL" --arg ts "$TIMESTAMP" \
            '.implementation=$impl | .verified=true | .updatedAt=$ts' \
            "$DEPLOY_FILE" > tmp.json
          mv tmp.json "$DEPLOY_FILE"
          cat "$DEPLOY_FILE"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/
          git diff --staged --quiet || git commit -m "feat(upgrade): deploy implementation ${{ steps.impl.outputs.IMPL }} to ${{ github.event.inputs.network }}"
          git push
