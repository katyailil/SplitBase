name: upgrade

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Where to upgrade"
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
        required: true
      rpc_url:
        description: "Custom RPC URL (optional, overrides default)"
        type: string
        required: false
      proxy:
        description: "Proxy address (optional, overrides manifest)"
        type: string
        required: false

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: deps
        run: forge install --no-git

      - name: set network
        id: net
        env:
          IN_NET: ${{ github.event.inputs.network }}
          IN_RPC: ${{ github.event.inputs.rpc_url }}
          SEPOLIA_RPC: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          MAINNET_RPC: ${{ secrets.BASE_MAINNET_RPC_URL }}
        run: |
          if [ "$IN_NET" = "sepolia" ]; then
            echo "CHAIN=84532" >> $GITHUB_OUTPUT
            echo "DEPLOY=deployments/84532.json" >> $GITHUB_OUTPUT
            DEF_RPC="$SEPOLIA_RPC"
          else
            echo "CHAIN=8453" >> $GITHUB_OUTPUT
            echo "DEPLOY=deployments/8453.json" >> $GITHUB_OUTPUT
            DEF_RPC="$MAINNET_RPC"
          fi
          RPC="${IN_RPC:-$DEF_RPC}"
          if [ -z "$RPC" ]; then
            echo "RPC URL is not set"; exit 1;
          fi
          echo "RPC=$RPC" >> $GITHUB_OUTPUT

      - name: resolve proxy
        id: addr
        env:
          DEPLOY_FILE: ${{ steps.net.outputs.DEPLOY }}
          IN_PROXY: ${{ github.event.inputs.proxy }}
        run: |
          if [ -n "$IN_PROXY" ]; then
            echo "PROXY=$IN_PROXY" >> $GITHUB_OUTPUT
          elif [ -f "$DEPLOY_FILE" ]; then
            PROXY=$(jq -r '.proxy' "$DEPLOY_FILE")
            if [ "$PROXY" = "null" ] || [ -z "$PROXY" ]; then
              echo "Proxy not found in $DEPLOY_FILE"; exit 1;
            fi
            echo "PROXY=$PROXY" >> $GITHUB_OUTPUT
          else
            echo "Deployment file $DEPLOY_FILE not found"; exit 1;
          fi

      - name: build
        run: forge build -v

      - name: deploy implementation (broadcast + json)
        id: impl
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          set -e
          mkdir -p out/ci
          forge create src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --private-key "$PRIVATE_KEY" \
            --rpc-url "$RPC_URL" \
            --broadcast \
            --json > out/ci/create.json

          IMPL=$(jq -r '
              .deployedTo
              // .contracts[0].address
              // .transactions[0].contractAddress
              // .receipts[0].contractAddress
              ' out/ci/create.json)

          if [ -z "$IMPL" ] || [ "$IMPL" = "null" ]; then
            echo "create.json:" && cat out/ci/create.json
            echo "Failed to detect implementation address"; exit 1;
          fi
          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "Implementation: $IMPL"

      - name: verify implementation
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # не валим джоб, если верификация ещё не видит байткод
          cast verify-contract ${{ steps.impl.outputs.IMPL }} \
            src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --rpc-url "$RPC_URL" \
            --etherscan-api-key "$API_KEY" || true

      - name: preflight proxiableUUID
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
        run: |
          cast call "$IMPL" "proxiableUUID()(bytes32)" --rpc-url "$RPC_URL" || true

      - name: upgrade proxy (nonce + gas bump, retry on underpriced)
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ steps.addr.outputs.PROXY }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
        run: |
          set -e

          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          NONCE=$(cast nonce "$SENDER" --rpc-url "$RPC_URL")

          BASE=$(cast gas-price --rpc-url "$RPC_URL")
          # расчёт fee с бампом (≈20%)
          MAX_FEE=$(python3 - <<PY
b=int("$BASE"); print(int(b*1.2))
PY
)
          PRIO=$(python3 - <<PY
b=int("$BASE")
p=max(int(b*0.1), 1_000_000_000)   
print(p)
PY
)

          echo "sender=$SENDER nonce=$NONCE base=$BASE maxFee=$MAX_FEE prio=$PRIO"

          send() {
            cast send "$PROXY" "$1" $2 \
              --private-key "$PRIVATE_KEY" \
              --rpc-url "$RPC_URL" \
              --nonce "$NONCE" \
              --priority-gas-price "$PRIO" \
              --max-fee-per-gas "$MAX_FEE" \
              --gas-limit 2200000
          }

          set +e
         
          OUT=$(send "upgradeTo(address)" "$IMPL" 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "first attempt failed, checking for 'underpriced'…"
            if echo "$OUT" | grep -qi "replacement transaction underpriced"; then
              echo "bumping fees and retrying same nonce…"
              MAX_FEE=$(python3 - <<PY
b=int("$MAX_FEE"); print(int(b*1.25))
PY
)
              PRIO=$(python3 - <<PY
p=int("$PRIO"); print(int(p*1.25))
PY
)
              OUT=$(send "upgradeTo(address)" "$IMPL" 2>&1)
              RC=$?
              echo "$OUT"
            fi
          fi

       
          if [ $RC -ne 0 ]; then
            echo "fallback: upgradeToAndCall(address,bytes)"
            OUT=$(send "upgradeToAndCall(address,bytes)" "$IMPL" "0x" 2>&1)
            RC=$?
            echo "$OUT"

            if [ $RC -ne 0 ] && echo "$OUT" | grep -qi "replacement transaction underpriced"; then
              echo "underpriced again → ещё один bump и retry"
              MAX_FEE=$(python3 - <<PY
b=int("$MAX_FEE"); print(int(b*1.25))
PY
)
              PRIO=$(python3 - <<PY
p=int("$PRIO"); print(int(p*1.25))
PY
)
              OUT=$(send "upgradeToAndCall(address,bytes)" "$IMPL" "0x" 2>&1)
              RC=$?
              echo "$OUT"
            fi
          fi
          set -e

          if [ $RC -ne 0 ]; then
            echo "upgrade failed"; exit $RC;
          fi
          echo "upgrade tx submitted"

      - name: update manifest
        env:
          DEPLOY_FILE: ${{ steps.net.outputs.DEPLOY }}
          IMPL: ${{ steps.impl.outputs.IMPL }}
        run: |
          tmp=$(mktemp)
          jq --arg impl "$IMPL" '.implementation=$impl | .verified=true' "$DEPLOY_FILE" > "$tmp"
          mv "$tmp" "$DEPLOY_FILE"

      - name: commit manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add deployments/
          git commit -m "ci(upgrade): stable gas-bumped resend on underpriced; keep nonce fixed; impl ${{ steps.impl.outputs.IMPL }}" || true
          git push
