name: upgrade

on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "🚀 Starting UUPS upgrade workflow"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install deps
        run: forge install --no-git

      - name: Select network
        id: net
        run: |
          echo "RPC=$(jq -r '.BaseSepolia.rpc // .BaseMainnet.rpc // env.RPC_URL' deployments/deploy-info.json 2>/dev/null || echo $RPC_URL)" >> $GITHUB_OUTPUT

      - name: Derive owner from PRIVATE_KEY
        id: owner
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "OWNER=$(cast wallet address --private-key $PRIVATE_KEY)" >> $GITHUB_OUTPUT

      - name: Check admin and owner
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "🔍 Checking current admin and caller"
          OWNER=$(cast wallet address --private-key $PRIVATE_KEY)
          echo "Your wallet address: $OWNER"

          # auto-detect deployment JSON
          DEPLOY_FILE=$(ls deployments/*.json | head -n 1)
          if [ -z "$DEPLOY_FILE" ]; then
            echo "❌ No deployment file found in /deployments"
            exit 1
          fi
          echo "Using deployment file: $DEPLOY_FILE"

          PROXY=$(jq -r '.proxy' "$DEPLOY_FILE")
          echo "Proxy: $PROXY"

          echo "Reading admin() and owner()..."
          cast call "$PROXY" "admin()(address)" --rpc-url "$RPC_URL" || echo "⚠️ admin() not found"
          cast call "$PROXY" "owner()(address)" --rpc-url "$RPC_URL" || echo "⚠️ owner() not found"

      - name: Build
        run: forge build

      - name: Deploy new implementation (broadcast + parse stdout)
        id: impl
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          forge create src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --private-key $PRIVATE_KEY \
            --rpc-url $RPC_URL \
            --verify \
            --etherscan-api-key ${{ secrets.API_KEY }} | tee deploy.log

          IMPL=$(grep "Deployed to:" deploy.log | awk '{print $3}')
          if [ -z "$IMPL" ]; then
            echo "❌ Failed to detect implementation address"
            exit 1
          fi
          echo "impl=$IMPL" >> $GITHUB_OUTPUT

      - name: Verify implementation
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          echo "🔍 Verifying contract..."
          cast verify-contract ${{ steps.impl.outputs.impl }} src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --rpc-url $RPC_URL || true

      - name: Preflight checks (UUPS proxiableUUID)
        id: uuid
        env:
          IMPL: ${{ steps.impl.outputs.impl }}
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          SLOT="0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc"
          echo "🔎 Checking proxiableUUID..."
          cast call "$IMPL" "proxiableUUID()(bytes32)" --rpc-url "$RPC_URL" || echo "⚠️ UUID not found"

      - name: Upgrade proxy (simulate + robust)
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          IMPL: ${{ steps.impl.outputs.impl }}
        run: |
          set -e
          DEPLOY_FILE=$(ls deployments/*.json | head -n 1)
          PROXY=$(jq -r '.proxy' "$DEPLOY_FILE")

          echo "⏫ Attempting proxy upgrade..."
          if ! cast send "$PROXY" "upgradeTo(address)" "$IMPL" \
              --private-key "$PRIVATE_KEY" \
              --rpc-url "$RPC_URL" --legacy --gas-limit 2000000; then
            echo "⚙️ Retry with upgradeToAndCall..."
            cast send "$PROXY" "upgradeToAndCall(address,bytes)" "$IMPL" "0x" \
              --private-key "$PRIVATE_KEY" \
              --rpc-url "$RPC_URL" --legacy --gas-limit 2000000 || {
                echo "❌ Both upgrade paths failed"
                exit 1
              }
          fi

      - name: Update manifest
        run: |
          DEPLOY_FILE=$(ls deployments/*.json | head -n 1)
          jq '.implementation="${{ steps.impl.outputs.impl }}"' "$DEPLOY_FILE" > tmp.json && mv tmp.json "$DEPLOY_FILE"
          echo "Manifest updated ✅"

      - name: Commit manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add deployments/
          git commit -m "chore(ci): fix auto detection for deployments and add robust upgrade retry" || echo "no changes"
          git push
