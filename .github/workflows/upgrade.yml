name: upgrade

on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Select network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=8453" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=84532" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi

      - name: Resolve proxy
        id: proxy
        run: |
          ADDR=$(jq -r '.proxy' "${{ steps.net.outputs.DEP }}")
          if ! echo "$ADDR" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then echo "invalid proxy"; exit 1; fi
          echo "PROXY=$ADDR" >> $GITHUB_OUTPUT
          echo "PROXY=$ADDR" >> $GITHUB_ENV
          echo "Proxy $ADDR"

      - name: Check owner matches PRIVATE_KEY
        id: who
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.PROXY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          OWNER=$(cast call "$PROXY" "admin()(address)" --rpc-url "$RPC_URL" || true)
          if [ -z "$OWNER" ] || [ "$OWNER" = "0x0000000000000000000000000000000000000000" ]; then
            OWNER=$(cast call "$PROXY" "owner()(address)" --rpc-url "$RPC_URL" || echo "")
          fi
          echo "Sender: $SENDER"
          echo "Owner:  $OWNER"
          if [ -z "$OWNER" ] || [ "${OWNER,,}" != "${SENDER,,}" ]; then echo "owner/admin mismatch"; exit 1; fi
          echo "SENDER=$SENDER" >> $GITHUB_OUTPUT

      - name: Build
        run: forge build -vv

      - name: Deploy new implementation (broadcast + parse stdout)
        id: create
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          forge create src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --rpc-url "$RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast -vvv | tee create.log

          IMPL=$(awk '/Deployed to: /{print $3}' create.log | tail -n1 | tr -d '\r\n')
          TX=$(awk '/Transaction hash: /{print $3}' create.log | tail -n1 | tr -d '\r\n')

          if ! echo "$IMPL" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then
            echo "impl not parsed"; cat create.log; exit 1;
          fi

          echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
          echo "TX=$TX" >> $GITHUB_OUTPUT
          echo "New implementation $IMPL"
          echo "Tx $TX"

      - name: Verify implementation
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge verify-contract \
            ${{ steps.create.outputs.IMPL }} \
            src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --chain ${{ steps.net.outputs.CID }} \
            --watch

      - name: Upgrade proxy (upgradeToAndCall + init admin)
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROXY: ${{ steps.proxy.outputs.PROXY }}
          IMPL: ${{ steps.create.outputs.IMPL }}
        run: |
          SENDER=$(cast wallet address --private-key "$PRIVATE_KEY")
          INIT=$(cast calldata "initialize(address)" "$SENDER")
          cast send "$PROXY" "upgradeToAndCall(address,bytes)" "$IMPL" "$INIT" \
            --rpc-url "$RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --legacy -vvvv

      - name: Update manifest
        env:
          DEP: ${{ steps.net.outputs.DEP }}
          IMPL: ${{ steps.create.outputs.IMPL }}
          RPC_URL: ${{ steps.net.outputs.RPC }}
        run: |
          BN=$(cast block-number --rpc-url "$RPC_URL")
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq --arg i "$IMPL" --argjson bn $BN --arg t "$ts" \
             '.implementation=$i | .blockNumber=$bn | .updatedAt=$t | .verified=true' \
             "$DEP" > tmp.json
          mv tmp.json "$DEP"
          cat "$DEP"

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/*.json
          git commit -m "chore(deployments): record upgrade for ${{ github.event.inputs.network }}"
          git push
