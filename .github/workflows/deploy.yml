name: deploy
on:
  workflow_dispatch:
    inputs:
      network:
        description: base or basesepolia
        required: true
        default: basesepolia
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Set RPC
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "base" ]; then
            echo "RPC=${{ secrets.RPC_BASE }}" >> $GITHUB_OUTPUT
            echo "CID=8453" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.RPC_BASE_SEPOLIA }}" >> $GITHUB_OUTPUT
            echo "CID=84532" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
      - name: Deploy proxy
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PK }}
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url "$RPC_URL" --broadcast --verify \
            --private-key "$PRIVATE_KEY" \
            --sig "run()" > out.txt
          IMPL=$(grep -i "Deployed implementation" -i out.txt | awk '{print $NF}')
          PROXY=$(grep -i "Deployed proxy" -i out.txt | awk '{print $NF}')
          TXI=$(grep -i "implementation tx:" -i out.txt | awk '{print $NF}')
          TXP=$(grep -i "proxy tx:" -i out.txt | awk '{print $NF}')
          BN=$(cast block-number --rpc-url "$RPC_URL")
          jq --arg p "$PROXY" --arg i "$IMPL" --arg txp "$TXP" --arg txi "$TXI" --argjson bn $BN \
             '.proxy=$p | .implementation=$i | .txHashProxy=$txp | .txHashImpl=$txi | .blockNumber=$bn | .verified=true | .updatedAt=now|toISOString' \
             "${{ steps.net.outputs.DEP }}" > tmp.json
          mv tmp.json "${{ steps.net.outputs.DEP }}"
      - name: Upload deployment files
        uses: actions/upload-artifact@v4
        with:
          name: deployments-${{ github.event.inputs.network }}
          path: deployments/*.json
