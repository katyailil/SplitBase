name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2 --no-git --no-commit
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2 --no-git --no-commit
          forge install foundry-rs/forge-std --no-git --no-commit

      - name: Check installed libraries
        run: |
          echo "Libraries installed:"
          ls -la lib/
          echo "---"
          find lib/openzeppelin-contracts-upgradeable -name "Initializable.sol" 2>/dev/null || echo "Initializable.sol not found"

      - name: Generate remappings
        run: forge remappings > remappings.txt && cat remappings.txt

      - name: Build
        run: forge build --force

      - name: Test
        run: forge test -vv || echo "No tests found"
