name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show forge version
        run: forge --version

      - name: List submodules
        run: |
          ls -la lib/
          echo "---"
          ls -la lib/openzeppelin-contracts-upgradeable/ || echo "Empty or missing"

      - name: Build
        run: forge build -vv
