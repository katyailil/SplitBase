name: inspect-proxy
on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
      proxy:
        description: proxy address (optional; read from deployments if empty)
        required: false

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
      - name: Select network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi
      - name: Resolve proxy
        id: proxy
        run: |
          if [ -n "${{ github.event.inputs.proxy }}" ]; then ADDR="${{ github.event.inputs.proxy }}"; else ADDR=$(jq -r '.proxy' "${{ steps.net.outputs.DEP }}"); fi
          echo "PROXY=$ADDR" >> $GITHUB_OUTPUT
          echo "Proxy: $ADDR" >> $GITHUB_STEP_SUMMARY
      - name: Inspect ERC1967 slots
        id: slots
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PROXY: ${{ steps.proxy.outputs.PROXY }}
        run: |
          IMPL_SLOT=0x360894a13ba1a3210667c828492db98dca3e2076cc3735a920a3ca505d382bbc
          ADMIN_SLOT=0xb53127684a568b3173ae13b9f8a6016e243e63b6e8ee1178d6a717850b5d6103
          RAW_IMPL=$(cast storage "$PROXY" "$IMPL_SLOT" --rpc-url "$RPC_URL" | tail -n1)
          RAW_ADMIN=$(cast storage "$PROXY" "$ADMIN_SLOT" --rpc-url "$RPC_URL" | tail -n1)
          IMPL=0x$(echo "$RAW_IMPL"  | tail -c 41)
          ADMIN=0x$(echo "$RAW_ADMIN" | tail -c 41)
          echo "IMPL=$IMPL"   >> $GITHUB_OUTPUT
          echo "ADMIN=$ADMIN" >> $GITHUB_OUTPUT
          {
            echo "### ERC1967 slots";
            echo "- implementation: $IMPL";
            echo "- admin:         $ADMIN";
          } >> $GITHUB_STEP_SUMMARY
      - name: Check proxiableUUID (UUPS test)
        id: uups
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          IMPL: ${{ steps.slots.outputs.IMPL }}
        run: |
          if cast call "$IMPL" "proxiableUUID()(bytes32)" --rpc-url "$RPC_URL" >/dev/null 2>&1; then
            echo "UUPS=true" >> $GITHUB_OUTPUT
            echo "UUPS-compatible implementation detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "UUPS=false" >> $GITHUB_OUTPUT
            echo "No proxiableUUID(): likely Transparent pattern" >> $GITHUB_STEP_SUMMARY
          fi
