name: deploy_v2

on:
  workflow_dispatch:
    inputs:
      network:
        description: network
        type: choice
        options: [sepolia, mainnet]
        default: sepolia
      reuse_proxy:
        description: existing proxyV2 address (optional)
        required: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          forge install OpenZeppelin/openzeppelin-contracts@v5.0.2
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable@v5.0.2
          forge install foundry-rs/forge-std@v1.9.1

      - name: Select network
        id: net
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            echo "RPC=${{ secrets.BASE_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=8453" >> $GITHUB_OUTPUT
            echo "DEP=deployments/8453.json" >> $GITHUB_OUTPUT
          else
            echo "RPC=${{ secrets.BASE_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "CID=84532" >> $GITHUB_OUTPUT
            echo "DEP=deployments/84532.json" >> $GITHUB_OUTPUT
          fi

      - name: Derive owner from PRIVATE_KEY
        id: owner
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          ADDR=$(cast wallet address --private-key "$PRIVATE_KEY")
          echo "OWNER=$ADDR" >> $GITHUB_OUTPUT
          echo "Owner: $ADDR"

      - name: Build
        run: forge build -vv

      - name: Deploy V2 proxy
        id: deploy
        env:
          RPC_URL: ${{ steps.net.outputs.RPC }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          OWNER: ${{ steps.owner.outputs.OWNER }}
        run: |
          if [ -n "${{ github.event.inputs.reuse_proxy }}" ]; then
            echo "IMPL=" >> $GITHUB_OUTPUT
            echo "PROXY=${{ github.event.inputs.reuse_proxy }}" >> $GITHUB_OUTPUT
            echo "Reusing proxy: ${{ github.event.inputs.reuse_proxy }}"
          else
            forge script script/DeployProxyV2.s.sol:DeployProxyV2 \
              --rpc-url "$RPC_URL" \
              --broadcast \
              --private-key "$PRIVATE_KEY" \
              --sig "run(address)" "$OWNER" -vvvv

            FILE=$(find broadcast -type f -name 'run-*.json' | sort | tail -n 1)
            IMPL=$(jq -r '.transactions[] | select(.contractName=="SplitBaseUpgradeable") | .contractAddress' "$FILE" | tail -n 1)
            PROXY=$(jq -r '.transactions[] | select(.contractName=="ERC1967Proxy") | .contractAddress' "$FILE" | tail -n 1)

            echo "Implementation: $IMPL"
            echo "Proxy: $PROXY"

            echo "IMPL=$IMPL" >> $GITHUB_OUTPUT
            echo "PROXY=$PROXY" >> $GITHUB_OUTPUT
          fi

      - name: Validate addresses
        id: val
        run: |
          ok=1
          if [ -n "${{ steps.deploy.outputs.IMPL }}" ]; then
            echo "${{ steps.deploy.outputs.IMPL }}" | grep -Eq '^0x[0-9a-fA-F]{40}$' || ok=0
          fi
          echo "${{ steps.deploy.outputs.PROXY }}" | grep -Eq '^0x[0-9a-fA-F]{40}$' || ok=0
          if [ $ok -ne 1 ]; then
            echo "Invalid IMPL or PROXY address"; exit 1;
          fi

      - name: Verify implementation
        if: steps.deploy.outputs.IMPL != ''
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge verify-contract \
            ${{ steps.deploy.outputs.IMPL }} \
            src/SplitBaseUpgradeable.sol:SplitBaseUpgradeable \
            --chain ${{ steps.net.outputs.CID }} \
            --watch

      - name: Update deployments manifest
        env:
          DEP: ${{ steps.net.outputs.DEP }}
          PROXY: ${{ steps.deploy.outputs.PROXY }}
          IMPL: ${{ steps.deploy.outputs.IMPL }}
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ -f "$DEP" ]; then
            jq --arg p "$PROXY" --arg i "$IMPL" --arg t "$ts" \
               '(.proxyV2=$p) | if $i != "" then (.implementation=$i) else . end | .updatedAt=$t' \
               "$DEP" > tmp.json
          else
            jq -n --arg p "$PROXY" --arg i "$IMPL" --arg t "$ts" \
               '{proxyV2:$p, implementation:$i, updatedAt:$t}' > tmp.json
          fi
          mv tmp.json "$DEP"
          cat "$DEP"

      - name: Commit deployments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/*.json
          git commit -m "chore(deployments): add V2 proxy and implementation for ${{ github.event.inputs.network }}"
          git push
